[scenarios]
# scenario -> oracle kinds it asserts (mirrors ViolationKind). `first_divergence`
# is true once the scenario routes failures through the first-divergence
# observer; currently pending the
# triage-replay integration, so all are false. See INTEGRATION.md.
dst_two_device_chaos = { oracles = ["Convergence", "NoLoss", "Corruption", "ConflictCopyAccounting", "StructuralIndexDiskMismatch", "StructuralOrphanIndexRow", "SlowConvergence"], first_divergence = false }
# The self-driving generated seed-sweep: generate_case -> op_applier -> full
# oracle suite (gates on Convergence + Corruption; the rest run advisory).
dst_generated_sweep = { oracles = ["Convergence", "NoLoss", "Corruption", "ConflictCopyAccounting", "StructuralIndexDiskMismatch", "StructuralOrphanIndexRow", "StructuralMaterializationMismatch", "ConvergedToWrongWinner"], first_divergence = false }
# Strong-eventual-consistency suite for the change-history DAG reference model:
# convergence, no resurrection, deterministic conflict-copy naming, and
# store-and-forward semantics.
dst_sec_convergence = { oracles = ["Convergence", "ConflictCopyAccounting"], first_divergence = false }
dst_three_device_mesh_chaos = { oracles = ["Convergence", "NoLoss", "Corruption", "ConflictCopyAccounting", "StructuralIndexDiskMismatch", "StructuralOrphanIndexRow", "SlowConvergence"], first_divergence = false }
dst_network_fault_chaos = { oracles = ["Convergence", "NoLoss", "Corruption", "ConflictCopyAccounting", "StructuralIndexDiskMismatch", "StructuralOrphanIndexRow", "SlowConvergence"], first_divergence = false }
dst_directory_chaos = { oracles = ["Convergence", "NoLoss", "Corruption", "ConflictCopyAccounting", "StructuralIndexDiskMismatch", "StructuralOrphanIndexRow", "SlowConvergence"], first_divergence = false }
dst_disk_crash_chaos = { oracles = ["Convergence", "NoLoss", "Corruption", "ConflictCopyAccounting", "StructuralIndexDiskMismatch", "StructuralOrphanIndexRow"], first_divergence = false }
dst_hydration_under_fault_chaos = { oracles = ["Convergence", "NoLoss", "Corruption", "StructuralIndexDiskMismatch", "StructuralOrphanIndexRow"], first_divergence = false }
dst_peer_reconcile_race = { oracles = ["NoLoss"], first_divergence = false }
dst_watcher_debounce = { oracles = ["NoLoss"], first_divergence = false }
# Drives its own materialization/crash asserts rather than the shared oracle
# kinds; no `check_*` oracle call, so no ViolationKind is listed.
dst_materialization_crash_recovery = { oracles = [], first_divergence = false }
# A targeted regression guard for directory-rename vs a concurrent child edit:
# asserts the edited bytes survive in both orderings with its own assert rather
# than a `check_*` oracle, so no ViolationKind is listed.
dst_directory_move_edit_race = { oracles = [], first_divergence = false }
# Repeated long-offline -> reconnect -> heal against the DAG heads-announce
# catch-up. Drives its own terminal convergence assertion rather than a `check_*`
# oracle, so no ViolationKind is listed.
dst_dag_catchup_chaos = { oracles = [], first_divergence = false }
