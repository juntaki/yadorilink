# DST module -> scenario impact map.
#
# Purpose: an agent (or developer) that touched `src/<module>.rs` reads this
# file to answer "which DST scenarios plausibly cover my diff, and which do I
# run *first*?" without reading every 1300-line scenario source. It is small,
# reviewable data, not a build-graph analysis.
#
# Two tables, both lint-enforced by `tests/dst_impact_map_lint.rs`:
#  [modules] every top-level `src/*.rs` module -> the scenarios exercising
#  it, ordered most-directly-relevant first ("run-this-first").
#  An empty list is legal and meaningful: it says "no DST
#  scenario targets this module yet" (a coverage signal, not an
#  error). The lint fails only when a module file exists with no
#  entry here, or an entry names a module file that does not
#  exist.
#  [scenarios] every `tests/dst_*.rs` scenario -> the oracle kinds it runs.
#  The lint fails when a `dst_*.rs` file has no entry, or an
#  entry names a scenario file that does not exist.
#
# Oracle kinds mirror `dst_support::oracle::ViolationKind`. Derived from each
# scenario's `check_*` oracle calls; keep in sync when a scenario gains/drops
# an oracle.

schema_version = 1

